name: Deploy Pages

on:
  push:
    branches:
      - master
  schedule:
    - cron: "11 0 * * *" # 12:11 am
      timezone: "America/Los_Angeles"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Refresh Strava token
        id: strava
        run: node scripts/refresh-strava-token.mjs
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}

      - name: Persist rotated Strava refresh token
        run: gh secret set STRAVA_REFRESH_TOKEN --repo "$GITHUB_REPOSITORY" < "${{ steps.strava.outputs.refresh_token_path }}"
        env:
          GH_TOKEN: ${{ secrets.GH_SECRET_ROTATOR_TOKEN }}

      - name: Build static site
        run: node scripts/build-site.mjs

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
