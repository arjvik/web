    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              paper: "#f7f3ec",
              ink: "#211d18",
              muted: "#6f675e",
              line: "#ded4c7",
              accent: "#dd5d2a",
              moss: "#5f745c",
              sky: "#6f8ea8",
            },
            fontFamily: {
              serif: ['"Playfair Display"', "Georgia", "serif"],
              sans: ['"Inter"', "system-ui", "sans-serif"],
            },
            boxShadow: {
              soft: "0 16px 40px rgba(33, 29, 24, 0.08)",
            },
          },
        },
      };

    <style>
      html {
        scroll-behavior: smooth;
      }

      body {
        letter-spacing: 0;
        overflow-x: hidden;
      }

      .calendar-grid,
      .calendar-months {
        display: grid;
      }

      .calendar-shell {
        min-width: 0;
        width: 100%;
      }

      .calendar-grid {
        gap: clamp(0.14rem, 0.7vw, 0.25rem);
        grid-auto-flow: column;
        grid-template-rows: repeat(7, minmax(0, 1fr));
      }

      .calendar-cell {
        aspect-ratio: 1 / 1;
        border-radius: 0.125rem;
        min-width: 0;
      }

      .activity-none {
        background: #ebe4da;
      }

      .activity-recovery {
        background: #e9a386;
      }

      .activity-active {
        background: #c94f1d;
      }

      .calendar-outside {
        background: transparent;
      }

      .gallery-frame {
        transition: opacity 180ms ease;
      }

      .gallery-nav {
        color: #211d18;
        position: absolute;
        top: 50%;
        transition: color 150ms ease;
        z-index: 10;
      }

      .gallery-nav:hover {
        color: #dd5d2a;
      }

      .gallery-nav-prev {
        left: -0.75rem;
        transform: translate(-100%, -50%);
      }

      .gallery-nav-next {
        right: -0.75rem;
        transform: translate(100%, -50%);
      }

      .affiliation-links {
        align-items: center;
        color: #6f675e;
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        justify-content: center;
        margin-top: 1rem;
      }

      .affiliation-link,
      .affiliation-mark {
        align-items: center;
        display: flex;
        height: 1.75rem;
        justify-content: center;
        width: 1.75rem;
      }

      .affiliation-link {
        transition:
          color 150ms ease,
          transform 150ms ease;
      }

      .affiliation-link:hover {
        color: #dd5d2a;
        transform: translateY(-1px);
      }

      .affiliation-link svg,
      .affiliation-mark svg,
      .affiliation-logo {
        display: block;
        height: 1.25rem;
        width: 1.25rem;
      }

      .affiliation-logo {
        object-fit: contain;
      }

      .affiliation-logo-animated {
        display: none;
      }

      .affiliation-link:hover .affiliation-logo-static,
      .affiliation-link:focus-visible .affiliation-logo-static {
        display: none;
      }

      .affiliation-link:hover .affiliation-logo-animated,
      .affiliation-link:focus-visible .affiliation-logo-animated {
        display: block;
      }

      .affiliation-logo-mark {
        height: 1.35rem;
        width: 1.35rem;
      }

      .affiliation-separator {
        color: #b8aa9b;
        font-size: 0.75rem;
        line-height: 1;
      }

      .affiliation-prefix {
        color: #6f675e;
        font-size: 0.7rem;
        font-weight: 500;
        letter-spacing: 0.02em;
        line-height: 1;
        margin-left: -0.25rem;
      }

      .activity-layout {
        display: grid;
        gap: 1.5rem;
      }

      .activity-map {
        background: #f4ede3;
      }

      .activity-map .leaflet-control-attribution {
        font-size: 0.55rem;
      }

      @media (max-width: 640px) {
        .gallery-nav {
          align-items: center;
          backdrop-filter: blur(8px);
          background: rgba(247, 243, 236, 0.82);
          border-radius: 9999px;
          box-shadow: 0 16px 40px rgba(33, 29, 24, 0.08);
          display: flex;
          height: 2.5rem;
          justify-content: center;
          width: 2.5rem;
        }

        .gallery-nav-prev {
          left: 0.5rem;
          transform: translateY(-50%);
        }

        .gallery-nav-next {
          right: 0.5rem;
          transform: translateY(-50%);
        }

        .affiliation-links {
          gap: 0.7rem;
          margin-top: 0.85rem;
        }

        .affiliation-prefix {
          margin-left: -0.1rem;
        }

        .calendar-grid {
          gap: 0.16rem;
        }

        .calendar-cell {
          border-radius: 0.1rem;
        }
      }

      @media (min-width: 720px) {
        .activity-layout {
          grid-template-columns: minmax(0, 1.6fr) minmax(15rem, 0.8fr);
          align-items: start;
        }

      }
    </style>
  </head>
