<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arjun Vikram</title>
    <meta
      name="description"
      content="Personal website for Arjun Vikram: notes, photography, and recent activity."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              paper: "#f7f3ec",
              ink: "#211d18",
              muted: "#6f675e",
              line: "#ded4c7",
              accent: "#dd5d2a",
              moss: "#5f745c",
              sky: "#6f8ea8",
            },
            fontFamily: {
              serif: ['"Playfair Display"', "Georgia", "serif"],
              sans: ['"Inter"', "system-ui", "sans-serif"],
            },
            boxShadow: {
              soft: "0 16px 40px rgba(33, 29, 24, 0.08)",
            },
          },
        },
      };
    </script>
    <style>
      html {
        scroll-behavior: smooth;
      }

      body {
        letter-spacing: 0;
        overflow-x: hidden;
      }

      .calendar-grid,
      .calendar-months {
        display: grid;
      }

      .calendar-shell {
        min-width: 0;
        width: 100%;
      }

      .calendar-grid {
        gap: clamp(0.14rem, 0.7vw, 0.25rem);
        grid-auto-flow: column;
        grid-template-rows: repeat(7, minmax(0, 1fr));
      }

      .calendar-cell {
        aspect-ratio: 1 / 1;
        border-radius: 0.125rem;
        min-width: 0;
      }

      .activity-none {
        background: #ebe4da;
      }

      .activity-recovery {
        background: #e9a386;
      }

      .activity-active {
        background: #c94f1d;
      }

      .calendar-outside {
        background: transparent;
      }

      .gallery-frame {
        transition: opacity 180ms ease;
      }

      .gallery-nav {
        color: #211d18;
        position: absolute;
        top: 50%;
        transition: color 150ms ease;
        z-index: 10;
      }

      .gallery-nav:hover {
        color: #dd5d2a;
      }

      .gallery-nav-prev {
        left: -0.75rem;
        transform: translate(-100%, -50%);
      }

      .gallery-nav-next {
        right: -0.75rem;
        transform: translate(100%, -50%);
      }

      .activity-layout {
        display: grid;
        gap: 1.5rem;
      }

      .activity-map {
        background: #f4ede3;
      }

      .activity-map .leaflet-control-attribution {
        font-size: 0.55rem;
      }

      @media (max-width: 640px) {
        .gallery-nav {
          align-items: center;
          backdrop-filter: blur(8px);
          background: rgba(247, 243, 236, 0.82);
          border-radius: 9999px;
          box-shadow: 0 16px 40px rgba(33, 29, 24, 0.08);
          display: flex;
          height: 2.5rem;
          justify-content: center;
          width: 2.5rem;
        }

        .gallery-nav-prev {
          left: 0.5rem;
          transform: translateY(-50%);
        }

        .gallery-nav-next {
          right: 0.5rem;
          transform: translateY(-50%);
        }

        .calendar-grid {
          gap: 0.16rem;
        }

        .calendar-cell {
          border-radius: 0.1rem;
        }
      }

      @media (min-width: 720px) {
        .activity-layout {
          grid-template-columns: minmax(0, 1.6fr) minmax(15rem, 0.8fr);
          align-items: start;
        }

      }
    </style>
  </head>
  <body class="bg-paper font-sans text-ink">
    <main class="mx-auto flex min-h-screen w-full max-w-5xl flex-col px-4 pb-8 pt-6 sm:px-8 sm:pb-10 sm:pt-8 lg:px-10">
      <header class="flex flex-col items-center text-center">
        <img
          src="./assets/portrait.jpg"
          alt="Portrait of Arjun Vikram"
          class="h-36 w-36 rounded-[1.1rem] border border-line object-cover shadow-soft sm:h-52 sm:w-52 sm:rounded-[1.35rem]"
        />
        <h1 class="mt-5 font-serif text-[2.6rem] font-medium leading-none tracking-normal sm:text-5xl">
          Arjun Vikram
        </h1>

        <nav aria-label="Primary" class="mt-5 flex flex-wrap items-center justify-center gap-x-8 gap-y-3 text-sm sm:mt-6">
          <a class="transition hover:text-accent" href="#photography">Photography</a>
          <a class="transition hover:text-accent" href="#activities">Activities</a>
        </nav>
      </header>

      <photo-gallery id="photography" class="mt-8 block scroll-mt-8"></photo-gallery>
      <strava-widget id="activities" class="mt-8 block scroll-mt-8"></strava-widget>
    </main>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
