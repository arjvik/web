<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arjun Vikram</title>
    <meta
      name="description"
      content="Personal website for Arjun Vikram: notes, photography, and recent activity."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              paper: "#f7f3ec",
              ink: "#211d18",
              muted: "#6f675e",
              line: "#ded4c7",
              accent: "#dd5d2a",
              moss: "#5f745c",
              sky: "#6f8ea8",
            },
            fontFamily: {
              serif: ['"Playfair Display"', "Georgia", "serif"],
              sans: ['"Inter"', "system-ui", "sans-serif"],
            },
            boxShadow: {
              soft: "0 16px 40px rgba(33, 29, 24, 0.08)",
            },
          },
        },
      };
    </script>
    <style>
      html {
        scroll-behavior: smooth;
      }

      body {
        letter-spacing: 0;
      }

      .calendar-grid,
      .calendar-months {
        display: grid;
      }

      .calendar-shell {
        min-width: 31rem;
      }

      .calendar-grid {
        gap: 0.25rem;
      }

      .calendar-cell {
        aspect-ratio: 1 / 1;
        border-radius: 0.125rem;
      }

      .activity-none {
        background: #ebe4da;
      }

      .activity-recovery {
        background: #ef8f42;
      }

      .activity-commute {
        background: #f3c58b;
      }

      .activity-active {
        background: #d65a1f;
      }

      .calendar-outside {
        background: transparent;
      }

      .gallery-frame {
        transition: opacity 180ms ease;
      }

      .activity-layout {
        display: grid;
        gap: 1.5rem;
      }

      @media (max-width: 640px) {
        .calendar-grid {
          gap: 0.18rem;
        }
      }

      @media (min-width: 720px) {
        .activity-layout {
          grid-template-columns: minmax(0, 1.6fr) minmax(15rem, 0.8fr);
          align-items: start;
        }

        .calendar-shell {
          min-width: 0;
        }
      }
    </style>
  </head>
  <body class="bg-paper font-sans text-ink">
    <main class="mx-auto flex min-h-screen w-full max-w-5xl flex-col px-5 pb-10 pt-8 sm:px-8 lg:px-10">
      <header class="flex flex-col items-center text-center">
        <img
          src="./assets/portrait.jpg"
          alt="Portrait of Arjun Vikram"
          class="h-44 w-44 rounded-[1.35rem] border border-line object-cover shadow-soft sm:h-52 sm:w-52"
        />
        <h1 class="mt-5 font-serif text-4xl font-medium tracking-normal sm:text-5xl">
          Arjun Vikram
        </h1>

        <nav aria-label="Primary" class="mt-6 flex flex-wrap items-center justify-center gap-x-8 gap-y-3 text-sm">
          <a class="transition hover:text-accent" href="#photography">Photography</a>
          <a class="transition hover:text-accent" href="#activities">Activities</a>
        </nav>
      </header>

      <photo-gallery id="photography" class="mt-8 block scroll-mt-8"></photo-gallery>
      <strava-widget id="activities" class="mt-8 block scroll-mt-8"></strava-widget>
    </main>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
